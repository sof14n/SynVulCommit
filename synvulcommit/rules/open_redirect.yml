rules:
  - id: synvul.cwe-601.open-redirect
    message: Redirect target is controlled by request data.
    severity: WARNING
    languages: [python]
    pattern-regex: >-
      (?s)\A(?!.*(?:urlparse|netloc|scheme|allowed|startswith\s*\()).*\b(?:redirect|HttpResponseRedirect|RedirectResponse)\s*\(\s*(?:request\.(?:args|form|GET|POST)\.get|target\b|next_url\b|next\b|url\b)
