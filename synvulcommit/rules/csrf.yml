rules:
  - id: synvul.cwe-352.csrf-disabled
    message: CSRF protection is disabled.
    severity: WARNING
    languages: [python]
    pattern-regex: '(?s)^(?!.*(CSRFProtect|csrf_token|csrfmiddlewaretoken|csrf_protect|WTF_CSRF_ENABLED["'']?\]?\s*=\s*True)).*(WTF_CSRF_ENABLED["'']?\]?\s*=\s*False|csrf\.exempt|@app\.(post|route)\([^\\n]*(POST|post))'
